#version: "3.8"

services:
  localstack:
    container_name: localstack
    image: localstack/localstack-pro:latest
    # networks:
    #   - mynet1
    ports:
      - "0.0.0.0:4566:4566" # LocalStack Gateway
      - "0.0.0.0:4510-4559:4510-4559" # external services port range
      - "0.0.0.0:443:443" # LocalStack HTTPS Gateway (Pro)
      - "0.0.0.0:5000:5000"
      - "0.0.0.0:80:80"
    environment:
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - LOCALSTACK_AUTH_TOKEN="ls-JISuFejU-1496-pAKO-gixu-geMi5780a735"
      - DISABLE_CORS_CHECKS=1
      - LOCALSTACK_HOST=localhost.localstack.cloud #host.docker.internal:4566
      - DEFAULT_REGION=us-east-1
      - EC2_VM_MANAGER=docker #localstack.services.ec2.vm_manager.DockerContainerManager
      #- GATEWAY_LISTEN=0.0.0.0:4566
      #- EXTRA_CORS_ALLOWED_ORIGINS=app://..
      #- EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:3000,https://app.localstack.cloud.

    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"

